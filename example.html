<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Tag Carousel</title>
  <style>
    .carousel-container {
      width: 600px;
      margin: 20px auto;
      text-align: center;
      font-family: Arial;
    }

    .tags {
      display: grid;
      grid-template-columns: repeat(6, 1fr); /* 6 sütun */
      gap: 8px;
      margin-bottom: 15px;
    }

    .tag {
      background: #007bff;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .page-info {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="carousel-container">
    <div class="tags" id="tagsBox"></div>

    <div class="controls">
      <button id="prevBtn">← Geri</button>
      <div class="page-info" id="pageInfo">Səhifə 1/1</div>
      <button id="nextBtn">İrəli →</button>
    </div>
  </div>

  <script>
    // 1) Tag-ları yaradırıq
    const allTags = [];
    for (let i = 1; i <= 53; i++) { // məsələn 53 tag
      allTags.push("Tag " + i);
    }

    // 2) Parametrlər
    const tagsPerPage = 24;
    let currentPage = 1;
    const totalPages = Math.ceil(allTags.length / tagsPerPage);

    const tagsBox = document.getElementById("tagsBox");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    // 3) Səhifəni göstərən funksiya
    function renderPage(page) {
      tagsBox.innerHTML = "";
      const start = (page - 1) * tagsPerPage;
      const end = start + tagsPerPage;
      const tags = allTags.slice(start, end);

      tags.forEach(tag => {
        const el = document.createElement("div");
        el.className = "tag";
        el.textContent = tag;
        tagsBox.appendChild(el);
      });

      pageInfo.textContent = "Səhifə " + page + "/" + totalPages;
      prevBtn.disabled = page === 1;
      nextBtn.disabled = page === totalPages;
    }

    // 4) Nəzarət düymələri
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage(currentPage);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderPage(currentPage);
      }
    });

    // İlk səhifəni göstər
    renderPage(currentPage);
  </script>
</body>
</html>
