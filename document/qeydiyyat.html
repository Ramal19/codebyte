<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeByte</title>
    <link rel="stylesheet" href="../style/qeydiyyat.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="con">
        <div class="circle"></div>
        <div class="form-box">
            <div class="box-left">
                <h1>
                    Daxil ol
                </h1>
                <p>
                    CodeByte'a xoş gəlmisiniz!
                </p>
                <div class="username">
                    <span class="username-icon">
                        <i class="bi bi-person"></i>
                        İstifadəçi adı
                    </span>
                    <input type="text" id="username-inp">
                </div>

                <div class="password">
                    <span class="password-icon">
                        <i class="bi bi-lock"></i>
                        Şifrə
                    </span>
                    <input type="password" id="password-inp">
                </div>

                <button id="loginBtn">
                    İndi daxil ol
                </button>

                <p>
                    Digərləri ilə <span>daxil olun</span>
                </p>

                <div class="others-sign">
                    <button class="google-sign">
                        <img src="../image/google.png" alt="Foto">
                        <span>google</span>ilə daxil olun
                    </button>

                    <button class="icloud-sign">
                        <img src="../image/icloud.png" alt="Foto">
                        <span>Apple</span> ilə daxil olun
                    </button>
                </div>
            </div>
            <div class="box-right">
                <div class="login-img">
                    <img src="../image/login.png" alt="Foto">
                </div>
            </div>
        </div>
    </div>

</body>

</html>
