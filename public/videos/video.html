<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Responsiv Lokal Video</title>
<style>
  /* Video konteyneri üçün */
  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 nisbəti */
    height: 0;
    overflow: hidden;
    max-width: 100%;
  }

  /* Video özü konteynerə tam uyğun olmalıdır */
  .video-wrapper video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>


<div class="video-wrapper">
  <video controls>
    <source src="./video-for-lesson.mp4" type="video/mp4" />
    Sizin brauzer video etiketini dəstəkləmir.
  </video>
</div>

</body>
</html>
